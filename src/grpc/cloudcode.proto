syntax = "proto3";

package google.internal.cloud.code.v1internal;

import "google/protobuf/struct.proto";

// Cloud Code PredictionService — internal gRPC API
service PredictionService {
  // Server-streaming RPC for content generation
  rpc StreamGenerateContent (StreamGenerateContentRequest)
      returns (stream StreamGenerateContentResponse);
}

// ============================================================
// Cloud Code envelope messages (v1internal-specific)
// ============================================================

message StreamGenerateContentRequest {
  string project = 1;
  string model = 2;
  GenerateContentRequest request = 3;
  string user_agent = 4;
  string request_type = 5;
  string request_id = 6;
}

message StreamGenerateContentResponse {
  GenerateContentResponse response = 1;
  string trace_id = 2;
  ResponseMetadata metadata = 3;
}

message ResponseMetadata {
  string model_version = 1;
}

// ============================================================
// Inner request/response — field numbers match public API
// google.cloud.aiplatform.v1.GenerateContentRequest
// ============================================================

message GenerateContentRequest {
  // Field 1 reserved (endpoint in public API)
  repeated Content contents = 2;
  repeated SafetySetting safety_settings = 3;
  GenerationConfig generation_config = 4;
  string model = 5;
  repeated Tool tools = 6;
  ToolConfig tool_config = 7;
  Content system_instruction = 8;
  string session_id = 20;  // Cloud Code specific
}

message GenerateContentResponse {
  // Field 1 reserved
  repeated Candidate candidates = 2;
  PromptFeedback prompt_feedback = 3;
  UsageMetadata usage_metadata = 4;
}

// ============================================================
// Content types — field numbers from public API
// ============================================================

message Content {
  string role = 1;
  repeated Part parts = 2;
}

message Part {
  string text = 1;
  Blob inline_data = 2;
  // Field 3-4 reserved
  FunctionCall function_call = 5;
  FunctionResponse function_response = 6;
  // Field 7-9 reserved
  bool thought = 10;
  string thought_signature = 11;
}

message Blob {
  string mime_type = 1;
  bytes data = 2;
}

// ============================================================
// Function calling types
// ============================================================

message FunctionCall {
  string name = 1;
  google.protobuf.Struct args = 2;
  string id = 3;  // Cloud Code specific (Claude tool use ID)
}

message FunctionResponse {
  string name = 1;
  google.protobuf.Struct response = 2;
  string id = 3;  // Cloud Code specific
}

// ============================================================
// Tools
// ============================================================

message Tool {
  repeated FunctionDeclaration function_declarations = 1;
}

message FunctionDeclaration {
  string name = 1;
  string description = 2;
  Schema parameters = 3;
}

message ToolConfig {
  FunctionCallingConfig function_calling_config = 1;
}

message FunctionCallingConfig {
  string mode = 1;
}

// ============================================================
// Schema — matches google.cloud.aiplatform.v1.Schema
// ============================================================

message Schema {
  Type type = 1;
  Schema items = 2;
  map<string, Schema> properties = 3;
  // Field 4 reserved
  repeated string required = 5;
  bool nullable = 6;
  string format = 7;
  string description = 8;
  repeated string enum = 9;
}

enum Type {
  TYPE_UNSPECIFIED = 0;
  STRING = 1;
  NUMBER = 2;
  INTEGER = 3;
  BOOLEAN = 4;
  ARRAY = 5;
  OBJECT = 6;
}

// ============================================================
// Generation config — field numbers from public API
// ============================================================

message GenerationConfig {
  float temperature = 1;
  float top_p = 2;
  int32 top_k = 3;
  // Field 4 reserved
  int32 max_output_tokens = 5;
  repeated string stop_sequences = 6;
  // Fields 7-24 reserved
  ThinkingConfig thinking_config = 25;
}

message ThinkingConfig {
  bool include_thoughts = 1;
  int32 thinking_budget = 2;
}

// ============================================================
// Response types
// ============================================================

message Candidate {
  int32 index = 1;
  Content content = 2;
  FinishReason finish_reason = 3;
}

enum FinishReason {
  FINISH_REASON_UNSPECIFIED = 0;
  STOP = 1;
  MAX_TOKENS = 2;
  SAFETY = 3;
  RECITATION = 4;
}

message PromptFeedback {
  string block_reason = 1;
}

message UsageMetadata {
  int32 prompt_token_count = 1;
  int32 candidates_token_count = 2;
  int32 total_token_count = 3;
}

// ============================================================
// Safety
// ============================================================

message SafetySetting {
  string category = 1;
  string threshold = 2;
}
